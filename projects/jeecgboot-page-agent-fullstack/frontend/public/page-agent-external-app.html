<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>整页跳转目标应用</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;padding:40px;background:linear-gradient(135deg,#fff7ed,#fff);color:#1f2937}.card{max-width:820px;background:#fff;border:1px solid #fed7aa;border-radius:22px;padding:30px;box-shadow:0 20px 50px rgba(15,23,42,.08)}.warn{color:#c2410c;font-weight:800}.ok{color:#15803d;font-weight:700}button{border:0;border-radius:10px;padding:10px 14px;background:#ea580c;color:white;font-weight:700;cursor:pointer}input{display:block;margin:12px 0;padding:10px;border:1px solid #cbd5e1;border-radius:10px;min-width:320px}</style>
</head>
<body>
  <main class="card">
    <p class="warn">场景 C/D：整页跳转或新 Tab 后的目标应用</p>
    <h1>这里已经不是 Vue 门户应用</h1>
    <p>如果你是从门户点击“整页跳转”来到这里，原来的 Vue App 和 PageAgent Web Chat 已经卸载。</p>
    <p>所以 PageAgent 通常只能完成“点击跳转”这一步；除非这个目标应用也接入同一套 Agent，并实现任务续接。</p>
    <input id="external-input" placeholder="如果没有新的 Agent，这里不会被继续自动操作" />
    <button id="external-button" onclick="document.getElementById('external-result').textContent='目标应用按钮被点击'">目标应用按钮</button>
    <p id="external-result" class="ok"></p>
    <p><a href="/page-agent-portal">返回门户测试页</a></p>
  </main>
</body>
</html>
