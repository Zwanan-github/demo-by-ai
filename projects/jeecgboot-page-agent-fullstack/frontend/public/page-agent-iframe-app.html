<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>同源 iframe 子应用</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;padding:28px;background:#f8fafc;color:#1f2937}.box{background:#fff;border:1px solid #bfdbfe;border-radius:18px;padding:24px;box-shadow:0 14px 30px rgba(15,23,42,.08)}button{border:0;border-radius:10px;padding:10px 14px;background:#2563eb;color:white;font-weight:700;cursor:pointer}input{display:block;margin:12px 0;padding:10px;border:1px solid #cbd5e1;border-radius:10px;min-width:280px}.ok{color:#15803d;font-weight:700}</style>
</head>
<body>
  <div class="box">
    <p>场景 B / 同源 iframe 子应用</p>
    <h1>iframe 内部页面</h1>
    <p>这个页面没有单独集成 PageAgent，但因为它与父页面同源，可用于测试父页面 Agent 是否能观察/点击 iframe 内 DOM。</p>
    <input id="iframe-input" placeholder="请让 PageAgent 填写 iframe 输入框" />
    <button id="iframe-inner-button" onclick="document.getElementById('iframe-result').textContent='iframe 内按钮已被点击'">iframe 内按钮</button>
    <p id="iframe-result" class="ok"></p>
  </div>
</body>
</html>
